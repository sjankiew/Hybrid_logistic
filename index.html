<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hybrid Logistic - ปรับปรุงการเชื่อมต่อ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Aptos&display=swap');
        body { font-family: 'Aptos', sans-serif; }
    </style>
</head>
<body class="bg-gray-50">

    <!-- Toast Notification (แถบแจ้งเตือน) -->
    <div id="toast-box" class="fixed top-5 right-5 hidden z-50 transition-opacity duration-300"></div>

    <script>
        // ปรับปรุงฟังก์ชันแจ้งเตือนให้ฉลาดขึ้น
        function showToast(message, isError = false, isPersistent = false) {
            const toast = document.getElementById('toast-box');
            
            // ถ้าเป็นสถานะออฟไลน์ปกติ ให้แสดงแค่สีเหลืองหรือสีเทา แทนสีแดงที่น่าตกใจ
            if (message.includes('ออฟไลน์') && !isPersistent) {
                toast.className = 'bg-amber-500 text-white px-4 py-2 rounded-lg shadow-lg';
            } else {
                toast.className = isError ? 'bg-red-600 text-white px-4 py-2 rounded-lg shadow-lg' : 'bg-green-600 text-white px-4 py-2 rounded-lg shadow-lg';
            }
            
            toast.textContent = message;
            toast.classList.remove('hidden');
            
            // ถ้าไม่ใช่ error ร้ายแรง ให้ปิดเองภายใน 3 วินาที
            if (!isPersistent) {
                setTimeout(() => toast.classList.add('hidden'), 3000);
            }
        }

        // ฟังชันก์ตรวจสอบสถานะเครือข่าย
        window.addEventListener('online', () => {
            showToast("กลับมาออนไลน์แล้ว กำลังซิงค์ข้อมูล...", false);
            // เพิ่มคำสั่งดึงข้อมูลใหม่เมื่อออนไลน์
        });

        window.addEventListener('offline', () => {
            showToast("ใช้งานแบบออฟไลน์ (บันทึกลงแคช)");
        });

        // ตัวอย่างการเรียกใช้ API แบบไม่พ่นแถบแดงทุกครั้ง
        async function fetchData() {
            try {
                const response = await fetch('YOUR_GAS_URL_HERE');
                if (!response.ok) throw new Error('Network Issue');
            } catch (err) {
                console.log("อยู่ในโหมดออฟไลน์หรือดึงข้อมูลไม่ได้");
                // ไม่ต้องแสดง toast ถ้าเป็นแค่การตรวจสอบ background
            }
        }
    </script>
</body>
</html>
